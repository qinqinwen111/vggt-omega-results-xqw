<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="data:,">
  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #eef1f5;
      color: #18202f;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    #canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    #status {
      position: absolute;
      left: 12px;
      top: 10px;
      max-width: calc(100% - 24px);
      padding: 6px 9px;
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.88);
      border: 1px solid rgba(148, 163, 184, 0.6);
      color: #334155;
      font-size: 12px;
      line-height: 1.35;
      pointer-events: none;
    }
  </style>
  <script type="importmap">
    {
      "imports": {
        "three": "./assets/three.module.js",
        "three/addons/": "./assets/"
      }
    }
  </script>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="status">Loading model...</div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/OrbitControls.js';
    import { MTLLoader } from 'three/addons/MTLLoader.js';
    import { OBJLoader } from 'three/addons/OBJLoader.js';
    import { PLYLoader } from 'three/addons/PLYLoader.js';

    const canvas = document.getElementById('canvas');
    const statusEl = document.getElementById('status');
    const params = new URLSearchParams(window.location.search);
    const type = params.get('type') || 'obj';
    const objPath = params.get('obj');
    const mtlPath = params.get('mtl');
    const srcPath = params.get('src');

    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
    renderer.setClearColor(0xeef1f5, 1);
    renderer.outputColorSpace = THREE.SRGBColorSpace;

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, 1, 0.01, 10000);
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.06;
    controls.screenSpacePanning = true;

    scene.add(new THREE.HemisphereLight(0xffffff, 0xb6c2d2, 2.0));
    const keyLight = new THREE.DirectionalLight(0xffffff, 1.8);
    keyLight.position.set(4, 6, 5);
    scene.add(keyLight);
    const fillLight = new THREE.DirectionalLight(0xffffff, 0.75);
    fillLight.position.set(-4, 2, -5);
    scene.add(fillLight);

    function splitPath(path) {
      const index = path.lastIndexOf('/');
      if (index < 0) {
        return { base: '', file: path };
      }
      return { base: path.slice(0, index + 1), file: path.slice(index + 1) };
    }

    function resize() {
      const width = canvas.clientWidth || window.innerWidth;
      const height = canvas.clientHeight || window.innerHeight;
      const needResize = canvas.width !== Math.floor(width * renderer.getPixelRatio())
        || canvas.height !== Math.floor(height * renderer.getPixelRatio());
      if (needResize) {
        renderer.setSize(width, height, false);
        camera.aspect = width / Math.max(height, 1);
        camera.updateProjectionMatrix();
      }
    }

    function fitCamera(root) {
      const box = new THREE.Box3().setFromObject(root);
      if (box.isEmpty()) {
        camera.position.set(0, 0, 3);
        controls.target.set(0, 0, 0);
        return 1;
      }
      const center = box.getCenter(new THREE.Vector3());
      const size = box.getSize(new THREE.Vector3());
      const maxDim = Math.max(size.x, size.y, size.z, 1e-3);
      const distance = maxDim / (2 * Math.tan(THREE.MathUtils.degToRad(camera.fov / 2)));
      camera.near = Math.max(maxDim / 5000, 0.0001);
      camera.far = Math.max(maxDim * 5000, 1000);
      camera.position.copy(center).add(new THREE.Vector3(distance * 0.65, distance * 0.45, distance * 1.45));
      controls.target.copy(center);
      controls.update();
      camera.updateProjectionMatrix();
      return maxDim;
    }

    function prepareObject(root, maxDim) {
      const pointSize = Math.max(maxDim * 0.003, 0.002);
      root.traverse((object) => {
        if (object.isMesh && object.material) {
          const materials = Array.isArray(object.material) ? object.material : [object.material];
          materials.forEach((material) => {
            material.side = THREE.DoubleSide;
            if (material.map) {
              material.map.colorSpace = THREE.SRGBColorSpace;
            }
          });
        }
        if (object.isPoints && object.material) {
          object.material.size = pointSize;
          object.material.sizeAttenuation = true;
          object.frustumCulled = false;
        }
      });
    }

    function updateProgress(event) {
      if (event.total) {
        statusEl.textContent = `Loading model... ${Math.round((event.loaded / event.total) * 100)}%`;
      }
    }

    function showObject(root) {
      scene.add(root);
      const maxDim = fitCamera(root);
      prepareObject(root, maxDim);
      statusEl.textContent = 'Ready';
      setTimeout(() => {
        statusEl.style.display = 'none';
      }, 900);
    }

    function loadMTL(path) {
      const loader = new MTLLoader();
      const { base, file } = splitPath(path);
      loader.setPath(base);
      loader.setResourcePath(base);
      return new Promise((resolve, reject) => {
        loader.load(file, resolve, updateProgress, reject);
      });
    }

    function loadOBJ(path, materials) {
      const loader = new OBJLoader();
      const { base, file } = splitPath(path);
      loader.setPath(base);
      if (materials) {
        loader.setMaterials(materials);
      }
      return new Promise((resolve, reject) => {
        loader.load(file, resolve, updateProgress, reject);
      });
    }

    function loadPLY(path) {
      const loader = new PLYLoader();
      return new Promise((resolve, reject) => {
        loader.load(path, (geometry) => {
          geometry.computeBoundingSphere();
          const hasFaces = Boolean(geometry.index);
          const hasColors = Boolean(geometry.getAttribute('color'));
          if (hasFaces) {
            if (!geometry.getAttribute('normal')) {
              geometry.computeVertexNormals();
            }
            resolve(new THREE.Mesh(geometry, new THREE.MeshStandardMaterial({
              color: 0xd8dee8,
              roughness: 0.95,
              metalness: 0,
              side: THREE.DoubleSide,
              vertexColors: hasColors,
            })));
          } else {
            resolve(new THREE.Points(geometry, new THREE.PointsMaterial({
              color: 0x0f766e,
              size: 0.01,
              sizeAttenuation: true,
              vertexColors: hasColors,
            })));
          }
        }, updateProgress, reject);
      });
    }

    async function load() {
      try {
        if (type === 'ply') {
          if (!srcPath) throw new Error('Missing PLY path.');
          showObject(await loadPLY(srcPath));
          return;
        }
        if (!objPath) throw new Error('Missing OBJ path.');
        let materials = null;
        if (mtlPath) {
          materials = await loadMTL(mtlPath);
          materials.preload();
        }
        showObject(await loadOBJ(objPath, materials));
      } catch (error) {
        console.error(error);
        statusEl.textContent = 'Failed to load model.';
      }
    }

    function animate() {
      resize();
      controls.update();
      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }

    window.addEventListener('resize', resize);
    animate();
    load();
  </script>
</body>
</html>
