<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; background: #eef1f5; color: #18202f; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    #canvas { display: block; width: 100%; height: 100%; }
    #status { position: absolute; left: 12px; top: 10px; max-width: calc(100% - 24px); padding: 6px 9px; border-radius: 6px; background: rgba(255,255,255,0.9); border: 1px solid rgba(148,163,184,0.6); color: #334155; font-size: 12px; line-height: 1.35; pointer-events: none; }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="status">Waiting...</div>
  <script type="module">
    import * as THREE from './assets/three.module.js';
    import { OrbitControls } from './assets/OrbitControls.js';

    const GLB_JSON = 0x4e4f534a;
    const GLB_BIN = 0x004e4942;
    const TYPE_COMPONENTS = { SCALAR: 1, VEC2: 2, VEC3: 3, VEC4: 4 };
    const COMPONENTS = {
      5120: { array: Int8Array, size: 1 }, 5121: { array: Uint8Array, size: 1 },
      5122: { array: Int16Array, size: 2 }, 5123: { array: Uint16Array, size: 2 },
      5125: { array: Uint32Array, size: 4 }, 5126: { array: Float32Array, size: 4 },
    };

    const canvas = document.getElementById('canvas');
    const statusEl = document.getElementById('status');
    const params = new URLSearchParams(window.location.search);
    const src = params.get('src');
    const sequential = params.get('seq') === '1';

    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
    renderer.setClearColor(0xeef1f5, 1);
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, 1, 0.01, 10000);
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.06;
    controls.screenSpacePanning = true;
    scene.add(new THREE.HemisphereLight(0xffffff, 0xb6c2d2, 2.2));

    function setStatus(text) { statusEl.textContent = text; }
    function notify(state) { if (sequential && window.parent) window.parent.postMessage({ type: 'glb-viewer-state', state, src }, '*'); }
    function resize() {
      const width = canvas.clientWidth || window.innerWidth;
      const height = canvas.clientHeight || window.innerHeight;
      const ratio = renderer.getPixelRatio();
      if (canvas.width !== Math.floor(width * ratio) || canvas.height !== Math.floor(height * ratio)) {
        renderer.setSize(width, height, false);
        camera.aspect = width / Math.max(height, 1);
        camera.updateProjectionMatrix();
      }
    }
    function animate() { resize(); controls.update(); renderer.render(scene, camera); requestAnimationFrame(animate); }
    async function downloadArrayBuffer(url) {
      let response = await fetch(url);
      if (!response.ok && response.status === 404 && url.startsWith('../')) {
        const fallbackUrl = url.replace(/^(\.\.\/)+/, '');
        setStatus(`Retrying GLB path... ${fallbackUrl}`);
        response = await fetch(fallbackUrl);
      }
      if (!response.ok) throw new Error(`HTTP ${response.status} while fetching GLB: ${url}`);
      const total = Number(response.headers.get('content-length') || 0);
      if (!response.body || !total) return response.arrayBuffer();
      const reader = response.body.getReader();
      const chunks = [];
      let received = 0;
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        chunks.push(value);
        received += value.byteLength;
        setStatus(`Downloading GLB... ${Math.round((received / total) * 100)}%`);
      }
      const merged = new Uint8Array(received);
      let offset = 0;
      for (const chunk of chunks) { merged.set(chunk, offset); offset += chunk.byteLength; }
      return merged.buffer;
    }
    function parseGlb(arrayBuffer) {
      const view = new DataView(arrayBuffer);
      if (view.getUint32(0, true) !== 0x46546c67) throw new Error('Not a GLB file');
      let offset = 12, jsonText = null, binOffset = 0;
      while (offset < arrayBuffer.byteLength) {
        const chunkLength = view.getUint32(offset, true);
        const chunkType = view.getUint32(offset + 4, true);
        offset += 8;
        if (chunkType === GLB_JSON) jsonText = new TextDecoder().decode(new Uint8Array(arrayBuffer, offset, chunkLength)).trim();
        else if (chunkType === GLB_BIN) binOffset = offset;
        offset += chunkLength;
      }
      if (!jsonText || !binOffset) throw new Error('GLB is missing JSON or BIN chunk');
      return { doc: JSON.parse(jsonText), binOffset };
    }
    function findPointPrimitive(doc) {
      for (const mesh of doc.meshes || []) {
        for (const primitive of mesh.primitives || []) {
          const mode = primitive.mode === undefined ? 4 : primitive.mode;
          if (mode === 0 && primitive.attributes && primitive.attributes.POSITION !== undefined) return primitive;
        }
      }
      throw new Error('No POINTS primitive found in GLB');
    }
    function makeAttribute(doc, arrayBuffer, binOffset, accessorIndex) {
      const accessor = doc.accessors[accessorIndex];
      const bufferView = doc.bufferViews[accessor.bufferView];
      const component = COMPONENTS[accessor.componentType];
      const itemSize = TYPE_COMPONENTS[accessor.type];
      const stride = bufferView.byteStride || component.size * itemSize;
      if (stride !== component.size * itemSize) throw new Error('Strided accessor is unsupported');
      const byteOffset = binOffset + (bufferView.byteOffset || 0) + (accessor.byteOffset || 0);
      return new THREE.BufferAttribute(new component.array(arrayBuffer, byteOffset, accessor.count * itemSize), itemSize, Boolean(accessor.normalized));
    }
    function fitCamera(accessor) {
      const min = accessor.min || [-1, -1, -1];
      const max = accessor.max || [1, 1, 1];
      const box = new THREE.Box3(new THREE.Vector3(min[0], min[1], min[2]), new THREE.Vector3(max[0], max[1], max[2]));
      const center = box.getCenter(new THREE.Vector3());
      const size = box.getSize(new THREE.Vector3());
      const maxDim = Math.max(size.x, size.y, size.z, 1e-3);
      const distance = maxDim / (2 * Math.tan(THREE.MathUtils.degToRad(camera.fov / 2)));
      camera.near = Math.max(maxDim / 5000, 0.0001);
      camera.far = Math.max(maxDim * 5000, 1000);
      camera.position.copy(center).add(new THREE.Vector3(distance * 0.65, distance * 0.45, distance * 1.45));
      controls.target.copy(center);
      controls.update();
      camera.updateProjectionMatrix();
      return { box, maxDim };
    }
    async function start() {
      if (!src) { setStatus('Missing GLB path.'); return; }
      notify('started');
      const started = performance.now();
      const buffer = await downloadArrayBuffer(src);
      setStatus('Parsing original 3M-point GLB...');
      await new Promise((resolve) => requestAnimationFrame(resolve));
      const { doc, binOffset } = parseGlb(buffer);
      const primitive = findPointPrimitive(doc);
      const positionAccessor = doc.accessors[primitive.attributes.POSITION];
      const position = makeAttribute(doc, buffer, binOffset, primitive.attributes.POSITION);
      const colorIndex = primitive.attributes.COLOR_0;
      const color = colorIndex === undefined ? null : makeAttribute(doc, buffer, binOffset, colorIndex);
      const geometry = new THREE.BufferGeometry();
      geometry.setAttribute('position', position);
      if (color) geometry.setAttribute('color', color);
      const { box, maxDim } = fitCamera(positionAccessor);
      geometry.boundingBox = box;
      geometry.boundingSphere = box.getBoundingSphere(new THREE.Sphere());
      const material = new THREE.PointsMaterial({ size: Math.max(maxDim * 0.0015, 0.0015), sizeAttenuation: true, vertexColors: Boolean(color) });
      const points = new THREE.Points(geometry, material);
      points.frustumCulled = false;
      scene.add(points);
      const seconds = ((performance.now() - started) / 1000).toFixed(1);
      setStatus(`Loaded ${position.count.toLocaleString()} points in ${seconds}s. Drag to rotate, scroll to zoom.`);
      notify('loaded');
      setTimeout(() => { statusEl.style.display = 'none'; }, 3500);
    }
    window.addEventListener('resize', resize);
    animate();
    if (sequential) {
      setStatus('Waiting in sequential queue...');
      notify('ready');
      window.addEventListener('message', (event) => { if (event.data && event.data.type === 'start-glb-viewer') start().catch((error) => { console.error(error); setStatus(`GLB load failed: ${error.message}`); notify('failed'); }); });
    } else {
      start().catch((error) => { console.error(error); setStatus(`GLB load failed: ${error.message}`); notify('failed'); });
    }
  </script>
</body>
</html>
