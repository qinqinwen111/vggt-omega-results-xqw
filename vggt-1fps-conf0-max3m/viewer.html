<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #eef1f5;
      color: #18202f;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    #canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    #status {
      position: absolute;
      left: 12px;
      top: 10px;
      max-width: calc(100% - 24px);
      padding: 6px 9px;
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.86);
      border: 1px solid rgba(148, 163, 184, 0.6);
      color: #334155;
      font-size: 12px;
      line-height: 1.35;
      pointer-events: none;
    }
  </style>
  <script type="importmap">
    {
      "imports": {
        "three": "./assets/three.module.js",
        "three/addons/": "./assets/"
      }
    }
  </script>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="status">Loading GLB...</div>
  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/OrbitControls.js';
    import { GLTFLoader } from 'three/addons/GLTFLoader.js';

    const canvas = document.getElementById('canvas');
    const statusEl = document.getElementById('status');
    const src = new URLSearchParams(window.location.search).get('src');

    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
    renderer.setClearColor(0xeef1f5, 1);

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, 1, 0.01, 10000);
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.06;
    controls.screenSpacePanning = true;

    scene.add(new THREE.HemisphereLight(0xffffff, 0xb6c2d2, 2.2));
    const keyLight = new THREE.DirectionalLight(0xffffff, 1.8);
    keyLight.position.set(4, 6, 5);
    scene.add(keyLight);

    function resize() {
      const width = canvas.clientWidth || window.innerWidth;
      const height = canvas.clientHeight || window.innerHeight;
      const needResize = canvas.width !== Math.floor(width * renderer.getPixelRatio())
        || canvas.height !== Math.floor(height * renderer.getPixelRatio());
      if (needResize) {
        renderer.setSize(width, height, false);
        camera.aspect = width / Math.max(height, 1);
        camera.updateProjectionMatrix();
      }
    }

    function normalizePointCloud(root, maxDim) {
      const pointSize = Math.max(maxDim * 0.0022, 0.002);
      root.traverse((object) => {
        if (object.isPoints) {
          const geometry = object.geometry;
          object.material = new THREE.PointsMaterial({
            size: pointSize,
            sizeAttenuation: true,
            vertexColors: Boolean(geometry && geometry.getAttribute('color')),
          });
          object.frustumCulled = false;
        }
        if (object.isMesh && object.material) {
          object.material.side = THREE.DoubleSide;
        }
      });
    }

    function fitCamera(root) {
      const box = new THREE.Box3().setFromObject(root);
      if (box.isEmpty()) {
        camera.position.set(0, 0, 3);
        controls.target.set(0, 0, 0);
        return 1;
      }
      const center = box.getCenter(new THREE.Vector3());
      const size = box.getSize(new THREE.Vector3());
      const maxDim = Math.max(size.x, size.y, size.z, 1e-3);
      const distance = maxDim / (2 * Math.tan(THREE.MathUtils.degToRad(camera.fov / 2)));
      camera.near = Math.max(maxDim / 5000, 0.0001);
      camera.far = Math.max(maxDim * 5000, 1000);
      camera.position.copy(center).add(new THREE.Vector3(distance * 0.65, distance * 0.45, distance * 1.45));
      controls.target.copy(center);
      controls.update();
      camera.updateProjectionMatrix();
      return maxDim;
    }

    function animate() {
      resize();
      controls.update();
      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }

    if (!src) {
      statusEl.textContent = 'Missing GLB path.';
    } else {
      const loader = new GLTFLoader();
      loader.load(
        src,
        (gltf) => {
          const root = gltf.scene;
          scene.add(root);
          const maxDim = fitCamera(root);
          normalizePointCloud(root, maxDim);
          statusEl.textContent = 'Drag to rotate, scroll to zoom';
          setTimeout(() => {
            statusEl.style.display = 'none';
          }, 1800);
        },
        (event) => {
          if (event.total) {
            statusEl.textContent = `Loading GLB... ${Math.round((event.loaded / event.total) * 100)}%`;
          }
        },
        (error) => {
          console.error(error);
          statusEl.textContent = 'Failed to load GLB. Use the download link below.';
        }
      );
    }

    window.addEventListener('resize', resize);
    animate();
  </script>
</body>
</html>
